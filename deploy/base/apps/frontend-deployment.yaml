apiVersion: apps/v1
kind: Deployment
metadata:
  name: mate-portal
  labels:
    app.kubernetes.io/name: mate-portal
    app.kubernetes.io/component: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mate-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mate-portal
        app.kubernetes.io/component: portal
    spec:
      containers:
        - name: portal
          image: mate-portal:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: Backend__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: mate-app-config
                  key: BACKEND_PUBLIC_URL
            - name: Oidc__Authority
              valueFrom:
                configMapKeyRef:
                  name: mate-app-config
                  key: KEYCLOAK_AUTHORITY
            - name: Oidc__ClientId
              value: "mate-portal"
            - name: Oidc__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: MATE_PORTAL_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
