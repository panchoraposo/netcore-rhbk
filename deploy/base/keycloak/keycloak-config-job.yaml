apiVersion: batch/v1
kind: Job
metadata:
  name: mate-keycloak-config
  labels:
    app.kubernetes.io/name: mate-keycloak-config
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mate-keycloak-config
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-config-cli
          image: quay.io/adorsys/keycloak-config-cli:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: "http://mate-keycloak-service:8080/"
            - name: KEYCLOAK_SSLVERIFY
              value: "false"
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: "300s"
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: mate-keycloak-initial-admin
                  key: username
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mate-keycloak-initial-admin
                  key: password

            - name: IMPORT_FILES_LOCATIONS
              value: "/config/*"
            - name: IMPORT_VALIDATE
              value: "true"
            - name: IMPORT_VARSUBSTITUTION_ENABLED
              value: "true"

            - name: MATE_PORTAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: MATE_PORTAL_CLIENT_SECRET
            - name: MATE_CLI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: MATE_CLI_CLIENT_SECRET
            - name: MATE_PORTAL_REDIRECT_URIS_JSON
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: MATE_PORTAL_REDIRECT_URIS_JSON
            - name: MATE_PORTAL_WEB_ORIGINS_JSON
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: MATE_PORTAL_WEB_ORIGINS_JSON

            - name: LDAP_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: LDAP_CONNECTION_URL
            - name: LDAP_USERS_DN
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: LDAP_USERS_DN
            - name: LDAP_GROUPS_DN
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: LDAP_GROUPS_DN
            - name: LDAP_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: mate-demo-config
                  key: LDAP_BIND_DN
            - name: LDAP_BIND_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: dirsrv-dm-password
                  key: dm-password
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: mate-bank-realm
