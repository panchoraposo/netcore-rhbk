apiVersion: v1
kind: Secret
metadata:
  name: mate-demo-config
type: Opaque
stringData:
  # Used by keycloak-config-cli variable substitution in the realm JSON
  MATE_PORTAL_CLIENT_SECRET: "demo-portal-secret"
  MATE_CLI_CLIENT_SECRET: "demo-cli-secret"
  MATE_PORTAL_REDIRECT_URIS_JSON: "[\"https://portal-mate-bank-demo.apps.example.com/*\"]"
  MATE_PORTAL_WEB_ORIGINS_JSON: "[\"https://portal-mate-bank-demo.apps.example.com\"]"

  LDAP_CONNECTION_URL: "ldap://dirsrv:3389"
  LDAP_USERS_DN: "ou=People,dc=mate,dc=bank,dc=demo"
  LDAP_GROUPS_DN: "ou=Groups,dc=mate,dc=bank,dc=demo"
  LDAP_BIND_DN: "cn=Directory Manager"
