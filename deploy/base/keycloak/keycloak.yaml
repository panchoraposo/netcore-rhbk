apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: mate-keycloak
  labels:
    app.kubernetes.io/name: mate-keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-postgres
    usernameSecret:
      name: keycloak-db
      key: username
    passwordSecret:
      name: keycloak-db
      key: password
  http:
    httpEnabled: true
  hostname:
    strict: false
  ingress:
    enabled: false
  proxy:
    headers: xforwarded
