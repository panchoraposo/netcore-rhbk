apiVersion: v1
kind: Secret
metadata:
  name: kerberos-keytab
type: Opaque
data:
  # PLACEHOLDER ONLY.
  # Replace this secret with a real keytab:
  #   oc -n <ns> create secret generic kerberos-keytab --from-file=http.keytab=/path/to/http.keytab --dry-run=client -o yaml | oc apply -f -
  #
  # The key must be named 'http.keytab' (mounted by the Keycloak podTemplate).
  http.keytab: UExBQ0VIT0xERVI=
